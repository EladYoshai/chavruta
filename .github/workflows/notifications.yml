name: Daily push notifications

on:
  schedule:
    # Every 30 minutes. The script decides whether this slot fires anything.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_type:
        description: 'Notification type to send immediately (omer, streak, encouragement_low, encouragement_medium, encouragement_high)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: notifications
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/package.json

      - name: Install deps
        working-directory: tools
        run: npm install --no-audit --no-fund

      - name: Write service account
        working-directory: tools
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json

      - name: Decide and send
        working-directory: tools
        env:
          FORCE_TYPE: ${{ github.event.inputs.force_type }}
          TZ: Asia/Jerusalem
        run: node scheduled_notifications.js
